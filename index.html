  var target = 0;
  for (var i = 0; i < WORD_DATA.length; i++) {
    if (WORD_DATA[i][0] <= t) target = i + 1;
    else break;
  }
  if (target === revealedWordCount) return;
  revealedWordCount = target;
  
  var winStart = Math.max(0, target - CAPTION_WINDOW);
  var winEnd = target;
  var html = '';
  for (var i = winStart; i < winEnd; i++) {
    if (i === winEnd - 1) html += '<span class="w-active">' + WORD_DATA[i][1] + '</span> ';
    else html += '<span class="w-done">' + WORD_DATA[i][1] + '</span> ';
  }
  transcriptText.innerHTML = html;
}

function findSceneIndex(t) {
  var idx = 0;
  for (var i = 0; i < SCENE_TIMES.length; i++) {
    if (t >= SCENE_TIMES[i]) idx = i;
    else break;
  }
  return idx;
}

// Particle system
var canvas = document.getElementById('pcv');
var ctx = canvas.getContext('2d');
var particles = [];
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function initParticles() {
  particles = [];
  for (var i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      vy: -(Math.random() * 0.3 + 0.05),
      vx: (Math.random() - 0.5) * 0.1,
      o: Math.random() * 0.3 + 0.05
    });
  }
}
initParticles();

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(function(p) {
    p.y += p.vy;
    p.x += p.vx;
    if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
    if (p.x < -10) p.x = canvas.width + 10;
    if (p.x > canvas.width + 10) p.x = -10;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(196,169,107,' + p.o + ')';
    ctx.fill();
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

var started = false;

function startPresentation() {
  if (started) return;
  started = true;
  titlecard.classList.add('gone');
  
  // Try fullscreen
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(function(){});
  }
  
  buildScenes();
  buildTranscript();
  showScene(0);
  dysphilterMark.classList.add('on');
  
  // Robust audio start - try multiple approaches
  function tryPlayAudio() {
    audio.play().then(function() {
      var bgMusic = document.getElementById('bgMusic');
      if (bgMusic) { 
        bgMusic.volume = 0.15; 
        bgMusic.loop = true;
        bgMusic.play().catch(function(){}); 
        bgMusic.addEventListener('ended', function() {
          bgMusic.currentTime = 0;
          bgMusic.play().catch(function(){});
        });
      }
    }).catch(function(e) {
      console.log('Audio play attempt failed:', e);
      // If autoplay blocked, show a visible tap prompt
      startbtn.textContent = 'TAP HERE TO PLAY';
      startbtn.style.cssText = 'display:block;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;font-size:1.4rem;padding:20px 80px;animation:pulse 1.5s infinite;';
      started = false;
      titlecard.classList.remove('gone');
    });
  }
  
  // Try immediately
  tryPlayAudio();
  
  // Also try after a short delay (in case media wasn't ready)
  setTimeout(function() {
    if (audio.paused && !started) {
      started = true;
      titlecard.classList.add('gone');
      tryPlayAudio();
    }
  }, 500);
  
  audio.addEventListener('timeupdate', function() {
    var t = audio.currentTime;
    // Music holds at current volume during speech
    updateCaptions(t);
    var idx = findSceneIndex(t);
    if (idx !== currentScene) showScene(idx);
    var pct = (t / (AUDIO_DURATION || audio.duration || 1454)) * 100;
    progressLine.style.width = Math.min(pct, 100) + '%';
  });
  
  audio.addEventListener('timeupdate', function(){
    if(audio.currentTime >= 1435 && !endcard.classList.contains('on')){
      endcard.classList.add('on');
      if(document.fullscreenElement) document.exitFullscreen();
    }
  });
  audio.addEventListener('ended', function() {
    // Hold music for 7 seconds after speech ends, then fade out
    var holdSeconds = 7;
    var fadeSeconds = 5;
    setTimeout(function() {
      if(bgMusic) {
        var vol = bgMusic.volume;
        var fadeInterval = setInterval(function() {
          vol -= (vol / (fadeSeconds * 10));
          if (vol <= 0) {
            bgMusic.volume = 0;
            clearInterval(fadeInterval);
          } else {
            bgMusic.volume = vol;
          }
        }, 100);
      }
    }, holdSeconds * 1000);
    // Show end card after the hold + fade
    setTimeout(function() {
      endcard.classList.add('on');
      if (document.fullscreenElement && document.exitFullscreen) {
        document.exitFullscreen().catch(function(){});
      }
    }, (holdSeconds + fadeSeconds) * 1000);
  });
}

startbtn.addEventListener('click', startPresentation);
demoBtn.addEventListener('click', startPresentation);

if (dropzone) {
  dropzone.addEventListener('click', function() { if(audioInput) audioInput.click(); });
}
if (audioInput) {
  audioInput.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (file) {
      var url = URL.createObjectURL(file);
      audio.src = url;
      audioName.textContent = file.name;
    }
  });
}
</script>
