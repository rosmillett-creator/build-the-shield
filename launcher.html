<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Opening film...</title>
<style>
body{margin:0;padding:0;background:#0a0d14;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Georgia,serif;color:#e6e2db;text-align:center}
a{color:#e8c97a;font-size:20px;text-decoration:none;padding:20px 40px;border:1px solid rgba(232,201,122,0.3);border-radius:8px}
a:hover{background:rgba(232,201,122,0.1)}
p{color:#5a6a7a;font-size:14px;margin-top:20px}
</style>
</head>
<body>
<div>
<p style="color:#5a6a7a;font-size:13px;letter-spacing:2px;margin-bottom:30px">CLICK THE BUTTON TO OPEN THE FILM</p>
<a href="https://rosmillett-creator.github.io/build-the-shield/" target="_blank" onclick="window.open('https://rosmillett-creator.github.io/build-the-shield/','_blank','width=9999,height=9999,toolbar=no,location=no,menubar=no,status=no');return false;">OPEN FILM</a>
<p>The film will open in its own window.<br>Nothing else will be visible.</p>
</div>
<script>
// Auto-open on any click
document.addEventListener('click', function(){
  window.open('https://rosmillett-creator.github.io/build-the-shield/','_blank','width=9999,height=9999,toolbar=no,location=no,menubar=no,status=no');
}, false);
</script>
</body>
</html>
